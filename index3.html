<!DOCTYPE html>
<html> 
<head> 
  <title>Work in Progress</title> 

  <!-- ✅ p5.js REQUIRED -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <style> 
    body {
      background-color: red;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* ✅ Modern layout */
    #defaultBlock { 
      display: flex; 
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    } 

    .block { 
      height: 470px; 
      width: 400px; 
      padding: 10px; 
      box-sizing: border-box;
    } 

    #block1 { background-color: #FFA500; } 
    #block2 { background-color: #008000; } 
    #block3 { background-color: #8A2BE2; } 

    h2 {
      text-align: center;
      margin-top: 0;
    }

    main > h2 {
      width: 100%;
      color: white;
    }
  </style>
</head> 

<body> 
  
  <main id="defaultBlock"> 
    <h2>babatunde393's Widget Page</h2> 

    <!-- Weather widget -->
    <a class="weatherwidget-io" 
      href="https://forecast7.com/en/6d523d38/lagos/" 
      data-label_1="LAGOS" 
      data-label_2="WEATHER" 
      data-theme="original">
      LAGOS WEATHER
    </a>

    <script>
      !function(d,s,id){
        var js,fjs=d.getElementsByTagName(s)[0];
        if(!d.getElementById(id)){
          js=d.createElement(s);
          js.id=id;
          js.src='https://weatherwidget.io/js/widget.min.js';
          fjs.parentNode.insertBefore(js,fjs);
        }
      }(document,'script','weatherwidget-io-js');
    </script>

    <!-- Snake Game -->
    <div id="block1" class="block"> 
      <h2>Snake Game</h2> 

      <script>
        let xDirectionArray = [1, 0, -1, 0];
        let yDirectionArray = [0, 1, 0, -1];
        let directionIndex = 0;

        let cX = [], cY = [];
        let len = 3;
        let diameter = 10;

        let foodX, foodY;

        let startBtn, rightBtn, downBtn, leftBtn, upBtn;

        let score = 0;
        let gameOver = false;

        let song, bell; 

        function preload() {
          song = loadSound("dk.mp3");
          bell = loadSound("dk_powerup.mp3");
        }

        function keyPressed() {
          if (keyCode === RIGHT_ARROW && directionIndex != 2) directionIndex = 0;
          if (keyCode === DOWN_ARROW && directionIndex != 3) directionIndex = 1;
          if (keyCode === LEFT_ARROW && directionIndex != 0) directionIndex = 2; 
          if (keyCode === UP_ARROW && directionIndex != 1) directionIndex = 3;
        }

        function rightButton() { if (directionIndex != 2) directionIndex = 0; }
        function downButton() { if (directionIndex != 3) directionIndex = 1; }
        function leftButton() { if (directionIndex != 0) directionIndex = 2; }
        function upButton() { if (directionIndex != 1) directionIndex = 3; }

        function startGame() {
          gameOver = false;
          score = 0;
          len = 3;
          plotFood();
          loop();
          if (song && !song.isPlaying()) song.loop();
        }

        function setup() {
          let canvas = createCanvas(380, 350);
          canvas.parent("block1"); // ✅ keep inside box

          frameRate(10);
          noLoop();

          cX[0] = 35; cY[0] = 15;
          cX[1] = 25; cY[1] = 15;
          cX[2] = 15; cY[2] = 15;

          plotFood();

          startBtn = createButton("Start");
          startBtn.parent("block1");
          startBtn.mouseClicked(startGame);

          rightBtn = createButton("D");
          rightBtn.parent("block1");
          rightBtn.mousePressed(rightButton);

          downBtn = createButton("S");
          downBtn.parent("block1");
          downBtn.mousePressed(downButton);

          leftBtn = createButton("A");
          leftBtn.parent("block1");
          leftBtn.mousePressed(leftButton);

          upBtn = createButton("W");
          upBtn.parent("block1");
          upBtn.mousePressed(upButton);
        }

        function plotFood() {
          let success = false;
          while (!success) {
            foodX = round(random(5, 380));
            foodX -= foodX % 10;
            foodX += 5;

            foodY = round(random(5, 350));
            foodY -= foodY % 10;
            foodY += 5;

            success = true;
            for (let i = 0; i < len; i++) {
              if (cX[i] == foodX && cY[i] == foodY) {
                success = false;
                break;
              }
            }
          }
        }

        function crossOver() {
          for (let i = 1; i < len; i++) {
            if (cX[0] == cX[i] && cY[0] == cY[i]) {
              gameOver = true;
              noLoop();
              if (song) song.stop();
            }
          }
        }

        function wallCollision() {
          if (cX[0] < 0 || cX[0] > width || cY[0] < 0 || cY[0] > height) {
            gameOver = true;
            noLoop();
            if (song) song.stop();
          }
        }

        function caterpillar() {
          if (cX[0] == foodX && cY[0] == foodY) {
            plotFood();
            len++;
            score++;
            if (bell) bell.play();
          }

          for (let i = len - 1; i > 0; i--) {
            cX[i] = cX[i - 1];
            cY[i] = cY[i - 1];
          }

          cX[0] += xDirectionArray[directionIndex] * 10;
          cY[0] += yDirectionArray[directionIndex] * 10;

          for (let i = 0; i < len; i++) {
            fill("green");
            circle(cX[i], cY[i], diameter);
          }
        }

        function draw() {
          background("black");

          if (!gameOver) {
            caterpillar();
            crossOver();
            wallCollision();

            fill("red");
            circle(foodX, foodY, 10);
          }

          fill("white");
          textSize(16);
          text('Score: ' + score, 10, 10);

          if (gameOver) {
            textSize(30);
            textAlign(CENTER, CENTER);
            text("GAME OVER!", width/2, height/2);
          }
        }
      </script>
    </div>

    <!-- Image block -->
    <div id="block2" class="block"> 
      <h2>Birchmount Park School</h2>
      <img src="bpci.jpg" width="100%">
    </div> 

    <!-- Calendar -->
    <div id="block3" class="block">
      <h2>April Calendar 2026</h2>
      <iframe
        src="https://calendar.google.com/calendar/embed?src=348566209%40tdsb.ca&ctz=America%2FToronto" 
        style="border: 0"
        width="100%" 
        height="250">
      </iframe>
    </div> 

  </main> 

</body> 
</html>
