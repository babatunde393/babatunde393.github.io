 <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>

</head> 

<body> 
  
  <main id="defaultBlock"> 
    <h2>babatunde393's Widget Page</h2> 

    <br><br>

    
    <a class="weatherwidget-io" 
      href="https://forecast7.com/en/6d523d38/lagos/" 
      data-label_1="LAGOS" 
      data-label_2="WEATHER" 
      data-theme="original">
      LAGOS WEATHER
    </a>

    <script>
      !function(d,s,id){
        var js,fjs=d.getElementsByTagName(s)[0];
        if(!d.getElementById(id)){
          js=d.createElement(s);
          js.id=id;
          js.src='https://weatherwidget.io/js/widget.min.js';
          fjs.parentNode.insertBefore(js,fjs);
        }
      }(document,'script','weatherwidget-io-js');
    </script>

    <br>

   
    <div id="block1"> 
      <h2>Snake Game</h2> 

      <script>
      let xDirectionArray = [1, 0, -1, 0];
      let yDirectionArray = [0, 1, 0, -1];
      let directionIndex = 0;

      let cX = [];
      let cY = [];
      let len = 3;
      let diameter = 10;

      let foodX;
      let foodY;

      let score = 0;
      let gameOver = false;

      function keyPressed() {
        if (keyCode === RIGHT_ARROW && directionIndex != 2) directionIndex = 0;
        if (keyCode === DOWN_ARROW && directionIndex != 3) directionIndex = 1;
        if (keyCode === LEFT_ARROW && directionIndex != 0) directionIndex = 2; 
        if (keyCode === UP_ARROW && directionIndex != 1) directionIndex = 3;
      }

      function setup() {
        let canvas = createCanvas(400, 400);
        canvas.parent("block1");

        frameRate(10);

        cX[0] = 35; cY[0] = 15;
        cX[1] = 25; cY[1] = 15;
        cX[2] = 15; cY[2] = 15;

        plotFood();
      }

      function plotFood() {
        foodX = floor(random(0,40)) * 10;
        foodY = floor(random(0,40)) * 10;
      }

      function draw() {
        background("black");

        if(!gameOver) {
          // move snake
          for (let i = len - 1; i > 0; i--) {
            cX[i] = cX[i - 1];
            cY[i] = cY[i - 1];

            if (cX[0] < 0 || cX[0] >= width || cY[0] < 0 || cY[0] >= height) {
            gameOver = true;
            }
          }

          cX[0] += xDirectionArray[directionIndex] * 10;
          cY[0] += yDirectionArray[directionIndex] * 10;

          // eat food
          if (cX[0] == foodX && cY[0] == foodY) {
            plotFood();
            len++;
            score++;
          }

          // draw snake
          for (let i = 0; i < len; i++) {
            fill("green");
            circle(cX[i], cY[i], diameter);
          }

          // draw food
          fill("red");
          circle(foodX, foodY, 10);
        }

        // score
        fill("white");
        textSize(20);
        text('Score: ' + score, 10, 20);
      }
      </script>
    </div>
