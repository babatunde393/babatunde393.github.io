<!DOCTYPE html>
<html> 
<head> 
  <title>Widget Page</title> 

  
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>

  <style> 
    body {
      background-color: red;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #defaultBlock { 
      display: flex; 
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    } 

    .block { 
      height: 500px; 
      width: 400px; 
      padding: 10px; 
      box-sizing: border-box;
      position: relative;
    } 

    #block1 { background-color: #FFA500; } 
    #block2 { background-color: #008000; } 
    #block3 { background-color: #8A2BE2; } 

    h2 {
      text-align: center;
      margin: 5px 0;
    }

    main > h2 {
      width: 100%;
      color: white;
    }

    
    .controls {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
    }
  </style>
</head> 

<body> 
  
  <main id="defaultBlock"> 
    <h2>babatunde393's Widget Page</h2> 

    
    <a class="weatherwidget-io" 
      href="https://forecast7.com/en/6d523d38/lagos/" 
      data-label_1="LAGOS" 
      data-label_2="WEATHER">
      LAGOS WEATHER
    </a>

    <script>
      !function(d,s,id){
        var js,fjs=d.getElementsByTagName(s)[0];
        if(!d.getElementById(id)){
          js=d.createElement(s);
          js.id=id;
          js.src='https://weatherwidget.io/js/widget.min.js';
          fjs.parentNode.insertBefore(js,fjs);
        }
      }(document,'script','weatherwidget-io-js');
    </script>

    
    <div id="block1" class="block"> 
      <h2>Snake Game</h2> 
      <div id="gameContainer"></div>
      <div class="controls" id="controls"></div>
    </div>

  
    <div id="block2" class="block"> 
      <h2>Birchmount Park School</h2>
      <img src="bpci.jpg" width="100%">
    </div> 

    
    <div id="block3" class="block">
      <h2>April Calendar 2026</h2>
      <iframe
        src="https://calendar.google.com/calendar/embed?src=348566209%40tdsb.ca&ctz=America%2FToronto" 
        style="border:0"
        width="100%" 
        height="250">
      </iframe>
    </div> 

  </main> 

 
  <script>
    let xDirectionArray = [1, 0, -1, 0];
    let yDirectionArray = [0, 1, 0, -1];
    let directionIndex = 0;

    let cX = [], cY = [];
    let len = 3;
    let foodX, foodY;

    let score = 0;
    let gameOver = false;

    function setup() {
      let canvas = createCanvas(360, 300);
      canvas.parent("gameContainer");

      frameRate(10);
      noLoop();
    

      cX = [35,25,15];
      cY = [15,15,15];

      plotFood();
    }
    function keyPressed() {
  if (keyCode === RIGHT_ARROW && directionIndex !== 2) directionIndex = 0;
  if (keyCode === DOWN_ARROW && directionIndex !== 3) directionIndex = 1;
  if (keyCode === LEFT_ARROW && directionIndex !== 0) directionIndex = 2;
  if (keyCode === UP_ARROW && directionIndex !== 1) directionIndex = 3;
}
      // buttons
      let controls = select("#controls");

      createButton("Start").parent(controls).mousePressed(startGame);
      createButton("⬆").parent(controls).mousePressed(()=>directionIndex=3);
      createButton("⬇").parent(controls).mousePressed(()=>directionIndex=1);
      createButton("⬅").parent(controls).mousePressed(()=>directionIndex=2);
      createButton("➡").parent(controls).mousePressed(()=>directionIndex=0);
    }

    function startGame() {
      gameOver = false;
      score = 0;
      len = 3;
      loop();
    }

    function plotFood() {
      foodX = floor(random(0,36))*10;
      foodY = floor(random(0,30))*10;
    }

    function draw() {
      background(0);

      if (!gameOver) {
        cX.unshift(cX[0] + xDirectionArray[directionIndex]*10);
        cY.unshift(cY[0] + yDirectionArray[directionIndex]*10);

        if (cX[0] === foodX && cY[0] === foodY) {
          score++;
          plotFood();
        } else {
          cX.pop();
          cY.pop();
        }

        // collisions
        if (cX[0] < 0 || cX[0] >= width || cY[0] < 0 || cY[0] >= height) {
          gameOver = true;
          noLoop();
        }

        for (let i=1;i<cX.length;i++){
          if(cX[0]===cX[i] && cY[0]===cY[i]){
            gameOver=true;
            noLoop();
          }
        }
      }

      fill("green");
      for (let i=0;i<cX.length;i++){
        rect(cX[i],cY[i],10,10);
      }

      fill("red");
      rect(foodX,foodY,10,10);

      fill("white");
      text("Score: "+score,10,15);

      if(gameOver){
        textAlign(CENTER);
        textSize(20);
        text("GAME OVER",width/2,height/2);
      }
    }
  </script>

</body> 
</html>
