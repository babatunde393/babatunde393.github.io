<html> 
<head> 
  <title>babatunde393's Widget Page</title> 

  <style> 
    body {
      background-color: red;
    }

    #defaultBlock { 
      display: table; 
    } 

    div { 
      float: left; 
      height: 470px; 
      width: 300px; 
      padding: 10px; 
    } 

    #block1 { 
      background-color: #FFA500; 
      width: 400px; 
    } 

    #block2 { 
      background-color: #008000;
      width: 400px; 
    } 

    #block3 { 
      background-color: #8A2BE2;
      width: 400px;
    } 

    h2 {
      text-align: center;
    }
  </style>
</head> 

<body> 
  
  <main id="defaultBlock"> 
    <h2>Work in progress</h2> 

    <br><br>

    <a class="weatherwidget-io" 
      href="https://forecast7.com/en/6d523d38/lagos/" 
      data-label_1="LAGOS" 
      data-label_2="WEATHER" 
      data-theme="original">
      LAGOS WEATHER
    </a>

    <script>
      !function(d,s,id){
        var js,fjs=d.getElementsByTagName(s)[0];
        if(!d.getElementById(id)){
          js=d.createElement(s);
          js.id=id;
          js.src='https://weatherwidget.io/js/widget.min.js';
          fjs.parentNode.insertBefore(js,fjs);
        }
      }(document,'script','weatherwidget-io-js');
    </script>

    <br><br>
    
    <div id="block1"> 
      <h2>Poptropica</h2> 
      <br> 
      <img src="Poptropica.jpeg" width="400" height="200">
    </div>

    
    <div id="block2"> 
      <h2>Birchmount Park School</h2>
      <br>
      <img src="bpci.jpg" width="400" height="200">
    </div> 

    
    <div id="block3">
      <h2>April Calendar 2026</h2>
      <br> 
      <iframe
        src="https://calendar.google.com/calendar/embed?src=348566209%40tdsb.ca&ctz=America%2FToronto" 
        style="border: 0"
        width="400" 
        height="200" 
        frameborder="0" 
        scrolling="no">
      </iframe>
    </div> 

  </main> 

</body> 
</html>
